pre-commit:
  files: git diff --name-only --cached
  parallel: true
  jobs:
    - name: format
      glob: "*.{js,jsx,ts,tsx,vue,json,jsonc,css,yml,yaml}"
      run: pnpm oxfmt {staged_files}

    - name: eslint
      glob: "*.{js,jsx,ts,tsx,vue}"
      run: eslint {staged_files}

    - name: mdclint
      glob: "*.md"
      run: mdclint {staged_files}

pre-push:
  jobs:
    - name: build
      run: pnpm build
